function applyFilter() {
    const minAmount = parseInt(document.getElementById('selAmount').value);
    renderContent(minAmount);
}

function formatAmount(val) {
    if (val >= 100000000) return (val / 100000000).toFixed(1) + ' 億';
    if (val >= 10000) return Math.round(val / 10000) + ' 萬';
    return val.toLocaleString();
}

function renderContent(minAmount) {
    let html = '';
    let hasContent = false;

    RAW_DATA.forEach(stock => {
        const filtered = stock.分點.filter(b => b.買超金額 >= minAmount);
        if (filtered.length === 0) return;
        hasContent = true;

        const maxAmt = Math.max(...filtered.map(b => b.買超金額));
        const etfTags = (Array.isArray(stock.etf_id) ? stock.etf_id : [stock.etf_id])
            .map(e => `<span class="etf-tag">${e}</span>`).join('');

        let rows = '';
        filtered.forEach(b => {
            const pct = maxAmt > 0 ? (b.買超金額 / maxAmt * 100) : 0;
            rows += `
            <tr>
              <td>${b.名稱}</td>
              <td>${b.買張.toLocaleString()}</td>
              <td>${b.賣張.toLocaleString()}</td>
              <td style="color:#e94560;font-weight:700">${b.買超張.toLocaleString()}</td>
              <td>
                <div class="amount-bar">
                  <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
                  <span class="amount-val">${formatAmount(b.買超金額)}</span>
                </div>
              </td>
            </tr>`;
        });

        html += `
        <div class="stock-card">
          <div class="stock-header">
            <div class="stock-left">
              <div class="stock-code">${stock.代號}</div>
              <div class="stock-name">${stock.名稱}</div>
              <div class="stock-etfs">${etfTags}</div>
            </div>
            <div class="stock-price">${stock.收盤價 > 0 ? stock.收盤價.toLocaleString() : '-'}</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>分點名稱</th>
                  <th>買(張)</th>
                  <th>賣(張)</th>
                  <th>買超(張)</th>
                  <th>買超金額</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    });

    if (!hasContent) {
        html = '<div class="no-data">目前無符合條件的分點資料</div>';
    }

    document.getElementById('mainContent').innerHTML = html;
}
