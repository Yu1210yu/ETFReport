    // 更新統計
    document.getElementById('resultSummary').innerHTML =
        `過去 <span>${days}</span> 天內，找到 <span>${inc.length + dec.length}</span> 檔個股被 <span>${minEtfs}</span> 家以上投信同步異動`;

    let html = '';

    // 增碼區塊
    if (inc.length > 0) {
        html += '<div class="section-title">🔴 同步加碼</div>';
        inc.forEach(([code, data]) => {
            html += renderCard(code, data, 'inc');
        });
    }

    // 減碼區塊
    if (dec.length > 0) {
        html += '<div class="section-title">🔵 同步減碼</div>';
        dec.forEach(([code, data]) => {
            html += renderCard(code, data, 'dec');
        });
    }

    if (inc.length + dec.length === 0) {
        html = '<div class="no-data">目前無符合條件的同步異動</div>';
    }

    document.getElementById('mainContent').innerHTML = html;
}

function renderCard(code, data, type) {
    const n = data.明細.length;
    const color = n >= ETF_COUNT * 0.7 ? '#f0c040' : n >= 5 ? '#e94560' : n >= 3 ? '#2ecc71' : '#4db8ff';
    const maxAbs = Math.max(...data.明細.map(d => Math.abs(d.增減張)));

    let rows = '';
    data.明細.forEach(d => {
        const pct = maxAbs > 0 ? Math.abs(d.增減張) / maxAbs * 100 : 0;
        const barColor = type === 'inc' ? '#e94560' : '#4db8ff';
        const sign = d.增減張 > 0 ? '+' : '';
        const amt = d.成交金額 || 0;
        const amtStr = amt >= 1e8 ? (amt/1e8).toFixed(1)+'億' : amt >= 1e4 ? Math.round(amt/1e4)+'萬' : '';
        rows += `
        <div class="etf-row">
          <span class="etf-badge">${d.etf_id}</span>
          <span class="etf-name-small">${d.etf_name}</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <span class="change-val" style="color:${barColor}">${sign}${d.增減張.toLocaleString()} 張</span>
          ${amtStr ? `<span style="color:#8b949e;font-size:11px;min-width:44px;text-align:right">${amtStr}</span>` : '<span style="min-width:44px"></span>'}
        </div>`;
    });

    return `
    <div class="stock-card">
      <div class="stock-header">
        <div class="stock-info">
          <div>
            <div class="stock-code">${code}</div>
            <div class="stock-name">${data.名稱}</div>
          </div>
        </div>
        <div style="text-align:center">
          <div class="count-badge" style="color:${color};border-color:${color}">${n}</div>
          <div class="count-label">家</div>
        </div>
      </div>
      ${rows}
    </div>`;
}

// 初始載入
applyFilter();
</script>
</body>
</html>
